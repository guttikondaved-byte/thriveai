[build]
  command = "pnpm install && pnpm --filter ./artifacts/stride-iq run build"
  publish = "artifacts/stride-iq/dist/public"

# Vite 7 requires Node 20.19+. Pin it so Netlify doesn't fall back to an older
# default Node (which fails the build and leaves the site on a stale deploy).
[build.environment]
  NODE_VERSION = "20"

#[[redirects]]
#  If your API will be deployed on Render (or any other host), set the
#  API_HOST environment variable in your Netlify site settings to the API
#  root (for example: https://thriveai-api.onrender.com) and uncomment
#  the block below to proxy `/api/*` requests through Netlify to your API.
#  This keeps browser requests same-origin and avoids CORS.

#[[redirects]]
#  from = "/api/*"
#  to = ":splat"
#  status = 200
#  force = false
#  conditions = { Host = "${API_HOST}" }

### Proxy API requests to the Render API so PATCH and other methods are forwarded.
[[redirects]]
  from = "/api/*"
  to = "https://thriveai-hxfw.onrender.com/api/:splat"
  status = 200
  force = true

### Single-page app fallback: serve index.html for all non-API routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
