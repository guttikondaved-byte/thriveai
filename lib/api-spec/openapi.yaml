openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Thrive API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: athlete
    description: Athlete profile
  - name: activities
    description: Training activities
  - name: plans
    description: Training plans
  - name: alerts
    description: Injury risk alerts
  - name: dashboard
    description: Dashboard summaries
  - name: openai
    description: Avera AI coach chat
  - name: injuries
    description: Athlete injury history
  - name: Auth
    description: Browser and mobile authentication endpoints
  - name: teams
    description: Coach team management and athlete invites
  - name: notifications
    description: In-app notifications
  - name: injury-risk
    description: Aggregated injury risk dashboard and soreness tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /athlete/profile:
    get:
      operationId: getAthleteProfile
      tags: [athlete]
      summary: Get athlete profile
      responses:
        "200":
          description: Athlete profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AthleteProfile"
    patch:
      operationId: updateAthleteProfile
      tags: [athlete]
      summary: Update athlete profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AthleteProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AthleteProfile"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List recent activities
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: date
          in: query
          description: Filter to activities on this date (YYYY-MM-DD).
          schema:
            type: string
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Log a new activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Created activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{id}:
    get:
      operationId: getActivity
      tags: [activities]
      summary: Get a single activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found

  /plans:
    get:
      operationId: listTrainingPlans
      tags: [plans]
      summary: List training plans
      responses:
        "200":
          description: List of training plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingPlan"
    post:
      operationId: createTrainingPlan
      tags: [plans]
      summary: Create a training plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingPlanInput"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingPlan"

  /plans/{id}:
    get:
      operationId: getTrainingPlan
      tags: [plans]
      summary: Get a training plan with sessions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Training plan with sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingPlanDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteTrainingPlan
      tags: [plans]
      summary: Delete a training plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /alerts:
    get:
      operationId: listInjuryAlerts
      tags: [alerts]
      summary: List injury risk alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InjuryAlert"

  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an injury alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InjuryAlert"
        "404":
          description: Not found

  /alerts/{id}/comments:
    get:
      operationId: listAlertComments
      tags: [alerts]
      summary: List a coach's comments on an injury alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InjuryAlertComment"
        "403":
          description: Forbidden
        "404":
          description: Not found
    post:
      operationId: createAlertComment
      tags: [alerts]
      summary: Leave a coach comment on an athlete's injury alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InjuryAlertComment"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /teams/{teamId}/members/{userId}/messages:
    get:
      operationId: listDirectMessages
      tags: [teams]
      summary: List the direct-message thread between a coach and one athlete on their team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DirectMessage"
        "403":
          description: Forbidden
        "404":
          description: Not found
    post:
      operationId: createDirectMessage
      tags: [teams]
      summary: Send a direct message to/from an athlete on the coach's team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectMessageBody"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectMessage"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /injury-risk/dashboard:
    get:
      operationId: getInjuryRiskDashboard
      tags: [injury-risk]
      summary: Get the aggregated injury risk dashboard for the current athlete
      responses:
        "200":
          description: Injury risk dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InjuryRiskDashboard"

  /injury-risk/intensity-map:
    get:
      operationId: getInjuryRiskIntensityMap
      tags: [injury-risk]
      summary: Get the calendar-month training intensity map for a given month
      parameters:
        - name: month
          in: query
          description: Target month as YYYY-MM. Defaults to the current month.
          schema:
            type: string
      responses:
        "200":
          description: Monthly intensity map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntensityMap"

  /injury-risk/what-if:
    get:
      operationId: getInjuryRiskWhatIf
      tags: [injury-risk]
      summary: What-if risk simulator — projected score for hypothetical weekly-mileage deltas
      responses:
        "200":
          description: What-if scenarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InjuryRiskWhatIf"

  /injury-risk/soreness:
    post:
      operationId: createSorenessEntry
      tags: [injury-risk]
      summary: Log a self-reported soreness entry for a body part
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSorenessBody"
      responses:
        "201":
          description: Created soreness entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorenessEntry"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all Avera conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new Avera conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message to Avera and receive a streaming response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /injuries:
    get:
      operationId: listInjuries
      tags: [injuries]
      summary: List athlete injury history
      responses:
        "200":
          description: List of injuries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Injury"
    post:
      operationId: createInjury
      tags: [injuries]
      summary: Log a new injury
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InjuryInput"
      responses:
        "201":
          description: Created injury
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Injury"

  /injuries/{id}:
    patch:
      operationId: updateInjury
      tags: [injuries]
      summary: Update injury status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InjuryInput"
      responses:
        "200":
          description: Updated injury
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Injury"
        "404":
          description: Not found
    delete:
      operationId: deleteInjury
      tags: [injuries]
      summary: Delete an injury record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /teams:
    post:
      tags: [teams]
      operationId: createTeam
      summary: Create a team (coach only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamBody'
      responses:
        '201':
          description: Team created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamInfo'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /teams/my:
    get:
      tags: [teams]
      operationId: getMyTeam
      summary: Get the current user's team
      responses:
        '200':
          description: Team info or null if not in a team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /teams/invite/{inviteCode}:
    get:
      tags: [teams]
      operationId: getTeamByInviteCode
      summary: Look up a team by invite code
      parameters:
        - name: inviteCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Team found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamInfo'
        '404':
          description: Team not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /teams/join:
    post:
      tags: [teams]
      operationId: joinTeam
      summary: Athlete joins a team using an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinTeamBody'
      responses:
        '200':
          description: Joined successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamInfo'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Invite code not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /teams/{teamId}/members:
    get:
      tags: [teams]
      operationId: getTeamMembers
      summary: Get athletes in a team (coach only)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of team members.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamMember'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /notifications:
    get:
      tags: [notifications]
      operationId: getNotifications
      summary: Get all notifications for the current user
      responses:
        '200':
          description: List of notifications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationItem'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /notifications/{id}/read:
    patch:
      tags: [notifications]
      operationId: markNotificationRead
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Notification updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationItem'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /notifications/read-all:
    post:
      tags: [notifications]
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      responses:
        '200':
          description: All notifications marked read.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkAllReadResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AthleteProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: ["integer", "null"]
        weeklyMileageGoal:
          type: ["number", "null"]
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced, elite]
        primaryGoal:
          type: string
        restingHeartRate:
          type: ["integer", "null"]
        hrv:
          type: ["number", "null"]
        selectedCoach:
          type: ["string", "null"]
          enum: [avera, kai, nova, rex, null]
        userRole:
          type: ["string", "null"]
          enum: [athlete, coach, null]
        country:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        pr5k:
          type: ["string", "null"]
        pr10k:
          type: ["string", "null"]
        prHalf:
          type: ["string", "null"]
        prMarathon:
          type: ["string", "null"]
        healthNotes:
          type: ["string", "null"]
        contactMethod:
          type: ["string", "null"]
          enum: [email, phone, null]
        contactValue:
          type: ["string", "null"]
        agenticModeEnabled:
          type: boolean
          description: Coach-only. When false, AveraAI answers as a plain chatbot instead of using tools to look up athletes or take actions.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - fitnessLevel
        - primaryGoal
        - agenticModeEnabled
        - createdAt

    AthleteProfileInput:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        weeklyMileageGoal:
          type: number
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced, elite]
        primaryGoal:
          type: string
        restingHeartRate:
          type: integer
        hrv:
          type: number
        selectedCoach:
          type: string
          enum: [avera, kai, nova, rex]
        userRole:
          type: string
          enum: [athlete, coach]
        country:
          type: string
        state:
          type: string
        pr5k:
          type: string
        pr10k:
          type: string
        prHalf:
          type: string
        prMarathon:
          type: string
        healthNotes:
          type: string
        contactMethod:
          type: string
          enum: [email, phone]
        contactValue:
          type: string
        agenticModeEnabled:
          type: boolean

    Injury:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: ["integer", "null"]
        injuryType:
          type: string
        bodyPart:
          type: string
        dateOccurred:
          type: string
          format: date
        dateRecovered:
          type: ["string", "null"]
          format: date
        status:
          type: string
          enum: [active, recovered]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - injuryType
        - bodyPart
        - dateOccurred
        - status
        - createdAt

    InjuryInput:
      type: object
      properties:
        injuryType:
          type: string
        bodyPart:
          type: string
        dateOccurred:
          type: string
          format: date
        dateRecovered:
          type: string
          format: date
